# Render Blueprint — deploy backend + frontend together
# Dashboard: New + → Blueprint → connect github.com/manishneupane0909-eng/ElementX
services:
  - type: web
    name: elementx-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      # Optional — app works without MongoDB (in-memory auth fallback)
      - key: MONGODB_URI
        sync: false
      # Free tier: https://aistudio.google.com/apikey → enable Generative Language API
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

  - type: web
    name: elementx-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: elementx-backend
          type: web
          envVarKey: RENDER_EXTERNAL_URL
